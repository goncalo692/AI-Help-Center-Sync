kind = "web"
previewPath = "/"
title = "Confluence Sync"
version = "1.0.0"
id = "artifacts/confluence-sync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18862

[services.development]
run = "pnpm --filter @workspace/confluence-sync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/confluence-sync", "run", "build" ]
publicDir = "artifacts/confluence-sync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18862"
BASE_PATH = "/"
