openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Confluence to Talkdesk Knowledge Management sync API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: App settings
  - name: folder-mappings
    description: Confluence folder to knowledge segment mappings
  - name: sync
    description: Sync operations
  - name: confluence
    description: Confluence API proxy
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
  /folder-mappings:
    get:
      operationId: listFolderMappings
      tags: [folder-mappings]
      summary: List all folder mappings
      responses:
        "200":
          description: List of folder mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FolderMapping"
    post:
      operationId: createFolderMapping
      tags: [folder-mappings]
      summary: Create a folder mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderMappingBody"
      responses:
        "201":
          description: Created folder mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderMapping"
  /folder-mappings/{id}:
    delete:
      operationId: deleteFolderMapping
      tags: [folder-mappings]
      summary: Delete a folder mapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [sync]
      summary: Get sync status
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
  /sync/trigger:
    post:
      operationId: triggerSync
      tags: [sync]
      summary: Manually trigger a sync
      responses:
        "200":
          description: Sync triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /sync/logs:
    get:
      operationId: getSyncLogs
      tags: [sync]
      summary: Get recent sync logs
      responses:
        "200":
          description: Recent sync logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncLog"
  /sync/sources:
    get:
      operationId: listSyncSources
      tags: [sync]
      summary: List all knowledge base sources with document counts
      responses:
        "200":
          description: List of sync sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncSource"
  /sync/sources/{mappingId}/documents:
    get:
      operationId: listSourceDocuments
      tags: [sync]
      summary: List documents synced for a specific source
      parameters:
        - name: mappingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of synced documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncedDocument"
  /sync/documents/{documentId}/preview:
    get:
      operationId: getDocumentPreview
      tags: [sync]
      summary: Get HTML preview for a synced document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document HTML preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentPreview"
  /confluence/folders:
    get:
      operationId: getConfluenceFolders
      tags: [confluence]
      summary: List top-level pages (folders) in the configured Confluence space
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfluenceFolder"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Settings:
      type: object
      properties:
        id:
          type: integer
        talkdeskAccountName:
          type: string
        talkdeskRegion:
          type: string
        confluenceSpaceKey:
          type: string
        syncIntervalMinutes:
          type: integer
          minimum: 1
          maximum: 60
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - talkdeskAccountName
        - talkdeskRegion
        - confluenceSpaceKey
        - syncIntervalMinutes
    UpdateSettingsBody:
      type: object
      properties:
        talkdeskAccountName:
          type: string
        talkdeskRegion:
          type: string
        confluenceSpaceKey:
          type: string
        syncIntervalMinutes:
          type: integer
          minimum: 1
          maximum: 60
      required:
        - talkdeskAccountName
        - talkdeskRegion
        - confluenceSpaceKey
        - syncIntervalMinutes
    FolderMapping:
      type: object
      properties:
        id:
          type: integer
        confluenceFolderId:
          type: string
        confluenceFolderName:
          type: string
        knowledgeSegmentName:
          type: string
        externalSourceId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - confluenceFolderId
        - confluenceFolderName
        - knowledgeSegmentName
    CreateFolderMappingBody:
      type: object
      properties:
        confluenceFolderId:
          type: string
        confluenceFolderName:
          type: string
        knowledgeSegmentName:
          type: string
      required:
        - confluenceFolderId
        - confluenceFolderName
        - knowledgeSegmentName
    SyncStatus:
      type: object
      properties:
        isRunning:
          type: boolean
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        lastRunStatus:
          type: string
          nullable: true
        lastRunErrored:
          type: integer
        lastRunErrorMessage:
          type: string
          nullable: true
        totalMappings:
          type: integer
        totalDocumentsTracked:
          type: integer
      required:
        - isRunning
        - lastRunErrored
        - totalMappings
        - totalDocumentsTracked
    SyncLog:
      type: object
      properties:
        id:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        documentsProcessed:
          type: integer
        documentsSkipped:
          type: integer
        documentsErrored:
          type: integer
        errorMessage:
          type: string
          nullable: true
      required:
        - id
        - startedAt
        - status
        - documentsProcessed
        - documentsSkipped
        - documentsErrored
    SyncSource:
      type: object
      properties:
        mappingId:
          type: integer
        confluenceFolderName:
          type: string
        knowledgeSegmentName:
          type: string
        externalSourceId:
          type: string
          nullable: true
        documentCount:
          type: integer
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - mappingId
        - confluenceFolderName
        - knowledgeSegmentName
        - documentCount
    SyncedDocument:
      type: object
      properties:
        id:
          type: integer
        confluenceDocumentId:
          type: string
        documentTitle:
          type: string
          nullable: true
        talkdeskDocumentId:
          type: string
          nullable: true
        contentHash:
          type: string
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - confluenceDocumentId
        - contentHash
    DocumentPreview:
      type: object
      properties:
        id:
          type: integer
        documentTitle:
          type: string
          nullable: true
        html:
          type: string
        confluenceDocumentId:
          type: string
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - confluenceDocumentId
        - html
    ConfluenceFolder:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        hasChildren:
          type: boolean
      required:
        - id
        - title
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
